version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    cooldown:
      default-days: 10
    assignees:
      - "hibare"
    groups:
      actions:
        patterns:
          - "*"

  # Maintain dependencies for Go mods
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    cooldown:
      default-days: 10
    assignees:
      - "hibare"
    allow:
      # Allow only direct updates for
      - dependency-type: "direct"
    groups:
      go:
        patterns:
          - "*"

  # Maintain version for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    cooldown:
      default-days: 10
    assignees:
      - "hibare"
    groups:
      docker:
        patterns:
          - "*"

    # Maintain dependencies for pre-commit
    - package-ecosystem: "pre-commit"
      directory: "/"
      schedule:
          interval: "monthly"
          day: "friday"
          time: "00:30"
      target-branch: "main"
    cooldown:
      default-days: 10
      assignees:
          - "hibare"
      groups:
          pre-commit:
              patterns:
                  - "*"
